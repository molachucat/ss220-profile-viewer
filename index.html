<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Demo v2.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrapper">

    <div class="card">
        <h1>Главный контейнер</h1>
        <div class="subtitle">
            Пример <span class="highlight">glass</span> эффекта
        </div>

        <button class="button" id="mainBtn">Красивая кнопка</button>
        <input class="input" placeholder="Введите текст...">

        <div class="small-text">Подсказка: попробуйте нажать кнопку</div>
    </div>

    <div class="card">
        <h1>Настройки</h1>
        <div class="subtitle">Анимированный переключатель</div>

        <label class="switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>

        <br><br>
        <button class="button">Сохранить</button>
        <button class="button purple">Доп. кнопка</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
